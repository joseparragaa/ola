<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Luisa ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope-back"></div>
            <div class="letter">
                <div class="letter-content">
                    <h1>Para mi bonita</h1>
                    <p>Te amo con todo mi corazón,</p>
                    <p>te amo y siempre te amaré. ❤️</p>
                </div>
            </div>
            <div class="envelope-front-left"></div>
            <div class="envelope-front-right"></div>
            <div class="envelope-front-bottom"></div>
            <div class="envelope-flap" id="flap"></div>
            <div class="heart-seal" id="seal">❤️</div>
            <div class="click-text">Toca el sobre</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
